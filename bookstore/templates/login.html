{% load static %}
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>登录 - 知阅书坊</title>

<style>
body{
    margin:0;
    font-family: "Microsoft YaHei", sans-serif;
    background:#f5f5f5;
    display:flex;
    height:100vh;
}

/* 左侧品牌区 */
.left-banner{
    flex:1;
    background:linear-gradient(135deg,#ff7a18,#ffb347);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:#fff;
    padding:40px;
}

.left-banner h1{
    font-size:34px;
    margin-bottom:10px;
}

.left-banner p{
    font-size:16px;
    opacity:0.9;
    text-align:center;
    max-width:300px;
}

/* 右侧登录区 */
.right-box{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    width:360px;
    background:#fff;
    padding:35px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.title{
    font-size:22px;
    font-weight:bold;
    margin-bottom:5px;
    color:#333;
}

.subtitle{
    font-size:13px;
    color:#999;
    margin-bottom:20px;
}

.input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

.input:focus{
    border-color:#ff7a18;
    box-shadow:0 0 0 3px rgba(255,122,24,0.1);
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,#ff7a18,#ffb347);
    color:#fff;
    font-size:15px;
    cursor:pointer;
}

.btn:hover{
    opacity:0.9;
}

.bottom{
    text-align:center;
    margin-top:15px;
    font-size:13px;
}

.bottom a{
    color:#ff7a18;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- 左侧品牌 -->
<div class="left-banner">
    <h1>📚 知阅书坊</h1>
    <p>发现好书 · 连接阅读 · 分享思想</p>
</div>

<!-- 右侧登录 -->
<div class="right-box">

    <div class="login-card">

        <div class="title">欢迎回来</div>
        <div class="subtitle">登录你的阅读世界</div>

        <form method="post">
            {% csrf_token %}

            <input class="input" name="username" placeholder="用户名">

            <input class="input" type="password" name="password" placeholder="密码">

            <button class="btn" type="submit">登录</button>
        </form>

        <div class="bottom">
            没有账号？<a href="/register/">立即注册</a>
        </div>

    </div>

</div>

</body>
</html>
